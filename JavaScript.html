<script>
    let studentDatabase = {};
    let isTimeEdited = false; // Flag to stop auto-update if user types
    let clockInterval;

    window.onload = function () {
        refreshData();
        startClock(); // Start the live clock
        setInterval(refreshData, 30000);
    };

    function refreshData() {
        google.script.run.withSuccessHandler(populateStudents).getStudentList();
    }

    function populateStudents(data) {
        // data: { normName: { displayName: "Exact Sheet Name", grade: "10" } }
        studentDatabase = data;
    }

    // Clock and Inactivity Logic
    let inactivityTimer;

    function startClock() {
        updateTimeUI();
        clockInterval = setInterval(updateTimeUI, 1000);

        // Listen for activity to reset the timer
        document.onmousemove = resetInactivityTimer;
        document.onkeypress = resetInactivityTimer;
        document.onclick = resetInactivityTimer;
    }

    function updateTimeUI() {
        if (isTimeEdited) return;

        // Apply grey styling
        const hourBox = document.getElementById("timeHour");
        const minBox = document.getElementById("timeMin");
        const ampmBox = document.getElementById("timeAmPm");

        if (!hourBox.classList.contains("auto-sync")) {
            hourBox.classList.add("auto-sync");
            minBox.classList.add("auto-sync");
            ampmBox.classList.add("auto-sync");
        }

        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const ampm = hours >= 12 ? "PM" : "AM";

        hours = hours % 12;
        hours = hours ? hours : 12;

        const minStr = minutes < 10 ? "0" + minutes : minutes;

        hourBox.value = hours;
        minBox.value = minStr;
        ampmBox.value = ampm;
    }

    // If user is idle for 60 seconds, re-sync to current time
    function resetInactivityTimer() {
        clearTimeout(inactivityTimer);
        // Only set the timer if the user has actually edited the time
        if (isTimeEdited) {
            inactivityTimer = setTimeout(reSyncClock, 60000); // 60,000 ms = 1 minute
        }
    }

    function reSyncClock() {
        isTimeEdited = false; // Allow auto-update again
        updateTimeUI(); // Force immediate update
        console.log("Inactivity detected: Clock re-synced.");
    }

    // Stop the clock and turn text white if student interacts
    function stopClock() {
        isTimeEdited = true;

        // Remove the grey styling
        document.getElementById("timeHour").classList.remove("auto-sync");
        document.getElementById("timeMin").classList.remove("auto-sync");
        document.getElementById("timeAmPm").classList.remove("auto-sync");

        resetInactivityTimer(); // Restart the 60s countdown
    }

    function autoFillGrade() {
        const name = document.getElementById("studentNameInput").value;
        const normName = name.trim().toLowerCase();
        const entry = studentDatabase[normName];
        if (entry && entry.grade) {
            const radios = document.getElementsByName("grade");
            for (let r of radios) {
                r.checked = false;
                if (r.value == entry.grade) r.checked = true;
            }
        } else {
            // If not found, clear all
            const radios = document.getElementsByName("grade");
            for (let r of radios) {
                r.checked = false;
            }
        }
    }

    // Grade Help Tooltip Logic
    function showGradeHelpPopup() {
        document.getElementById("gradeHelpPopup").style.display = "flex";
    }
    function closeGradeHelpPopup() {
        document.getElementById("gradeHelpPopup").style.display = "none";
    }

    // Universal Custom Tooltip Logic
    function showCustomPopup({ title = '', message = '', buttons = [] }) {
        document.getElementById("customPopupTitle").innerText = title;
        document.getElementById("customPopupMsg").innerHTML = message;
        const btnContainer = document.getElementById("customPopupButtons");
        btnContainer.innerHTML = '';
        buttons.forEach(btn => {
            const button = document.createElement('button');
            button.innerText = btn.text;
            button.className = btn.className || 'close-grade-help';
            button.onclick = function () {
                closeCustomPopup();
                if (btn.onClick) btn.onClick();
            };
            btnContainer.appendChild(button);
        });
        document.getElementById("customPopup").style.display = "flex";
    }
    function closeCustomPopup() {
        document.getElementById("customPopup").style.display = "none";
    }

    function set24HourTime() {
        const hh = parseInt(document.getElementById("timeHour").value);
        const mm = parseInt(document.getElementById("timeMin").value);
        const ampm = document.getElementById("timeAmPm").value;

        if (isNaN(hh) || isNaN(mm) || hh < 1 || hh > 12 || mm < 0 || mm > 59) {
            showCustomPopup({
                title: "ERROR",
                message: "Invalid Time Entered.",
                buttons: [
                    { text: "OK" }
                ]
            });
            return false;
        }

        // Convert to 24h string
        let hours24 = hh;
        if (ampm === "PM" && hh < 12) hours24 = hh + 12;
        if (ampm === "AM" && hh === 12) hours24 = 0;

        const mmStr = mm < 10 ? "0" + mm : mm;
        const hhStr = hours24 < 10 ? "0" + hours24 : hours24;

        const finalTimeStr = hhStr + ":" + mmStr;
        document.getElementById("hiddenManualTime").value = finalTimeStr;
        return true;
    }

    // Submit Handling
    function triggerSubmit(type) {
        const form = document.getElementById("accessForm");

        // Set hidden type field
        document.getElementById("hiddenCheckType").value = type;

        // Validate inputs
        if (!form.grade.value) {
            showCustomPopup({
                title: "ERROR",
                message: "Please select your Grade.",
                buttons: [
                    { text: "OK" }
                ]
            });
            return;
        }

        const name = form.studentName.value;
        const normName = name.trim().toLowerCase();
        if (!name) {
            showCustomPopup({
                title: "ERROR",
                message: "Please enter a name.",
                buttons: [
                    { text: "OK" }
                ]
            });
            return;
        }
        if (!studentDatabase[normName]) {
            showCustomPopup({
                title: "Unrecognized Student",
                message: "UNRECOGNIZED STUDENT: '<span style='color:var(--neon-blue)'>" + name + "</span>'.<br><br>Add this new user to the database?",
                buttons: [
                    { text: "Cancel" },
                    { text: "Add", onClick: () => actuallySubmit(type, form, normName, name) }
                ]
            });
            return;
        }

        if (!set24HourTime()) return;

        // Send to backend
        document.getElementById("loading").style.display = "flex";
        google.script.run.withSuccessHandler(afterSubmit).processForm(form);
    }

    // Helper for custom confirm logic
    function actuallySubmit(type, form, normName, name) {
        set24HourTime();

        document.getElementById("loading").style.display = "flex";
        google.script.run.withSuccessHandler(afterSubmit).processForm(form);
    }

    function afterSubmit(response) {
        refreshData();
        const msg = document.getElementById("statusMsg");
        if (response.status === "ERROR") {
            msg.innerHTML = "ERROR:<br>" + (response.message || "Unknown error.");
            msg.style.color = "#ff0055";
            setTimeout(() => {
                document.getElementById("loading").style.display = "none";
                msg.innerHTML = "PROCESSING...";
                msg.style.color = "white";
            }, 3000);
            return;
        }
        if (response.type === "Check In") {
            msg.innerHTML = "ACCESS GRANTED.<br>WELCOME BACK.";
            msg.style.color = "var(--neon-green)";
        } else {
            msg.innerHTML = "SESSION ENDED.<br>SEE YOU NEXT TIME.";
            msg.style.color = "#ff0055";
        }
        setTimeout(() => {
            document.getElementById("accessForm").reset();
            document.getElementById("loading").style.display = "none";
            msg.innerHTML = "PROCESSING...";
            msg.style.color = "white";
            // Restart the live clock for the next user
            isTimeEdited = false;
            updateTimeUI();
        }, 2000);
    }

    // Dropdown Logic
    function showSuggestions() {
        const input = document.getElementById("studentNameInput");
        const list = document.getElementById("suggestions");
        const query = input.value.trim().toLowerCase();
        list.innerHTML = "";
        if (query.length === 0) {
            list.style.display = "none";
            return;
        }
        const allNormNames = Object.keys(studentDatabase);
        // Use display names for matching and display
        const startsWith = allNormNames.filter((normName) =>
            studentDatabase[normName].displayName.toLowerCase().startsWith(query),
        );
        startsWith.sort((a, b) =>
            studentDatabase[a].displayName.localeCompare(
                studentDatabase[b].displayName,
            ),
        );
        const contains = allNormNames.filter(
            (normName) =>
                studentDatabase[normName].displayName.toLowerCase().includes(query) &&
                !studentDatabase[normName].displayName.toLowerCase().startsWith(query),
        );
        contains.sort((a, b) =>
            studentDatabase[a].displayName.localeCompare(
                studentDatabase[b].displayName,
            ),
        );
        const matches = [...startsWith, ...contains];
        if (matches.length > 0) {
            list.style.display = "block";
            matches.forEach((normName) => {
                const displayName = studentDatabase[normName].displayName;
                const li = document.createElement("li");
                li.setAttribute("role", "option");
                const regex = new RegExp(`(${query})`, "gi");
                const highlightedName = displayName.replace(
                    regex,
                    "<strong>$1</strong>",
                );
                li.innerHTML = highlightedName;
                li.onclick = () => {
                    input.value = displayName;
                    list.style.display = "none";
                    autoFillGrade();
                };
                list.appendChild(li);
            });
        } else {
            list.style.display = "none";
        }
    }

    document.addEventListener("click", function (e) {
        const wrapper = document.querySelector(".input-wrapper");
        if (!wrapper.contains(e.target)) {
            document.getElementById("suggestions").style.display = "none";
        }
    });

    // Close suggestions on Escape key
    document
        .getElementById("studentNameInput")
        .addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                document.getElementById("suggestions").style.display = "none";
            }
        });
</script>
