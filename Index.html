<!doctype html>
<html>

<head>
    <base target="_top" />
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700&family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap"
        rel="stylesheet" />

    <!-- Inject CSS -->
    <?!= include('Stylesheet'); ?>
</head>

<body>
    <div class="container">
        <h1>FRC Check In/Out</h1>

        <form id="accessForm">
            <input type="hidden" name="checkType" id="hiddenCheckType" />
            <input type="hidden" name="manualTime" id="hiddenManualTime" />

            <label for="studentNameInput">STUDENT NAME</label>
            <div class="input-wrapper">
                <input type="text" name="studentName" id="studentNameInput" placeholder="Begin typing name..." required
                    autocomplete="off" aria-autocomplete="list" aria-controls="suggestions" aria-label="Student Name"
                    oninput="showSuggestions()" onfocus="showSuggestions()" />
                <ul id="suggestions" class="suggestions-list" role="listbox" aria-label="Student suggestions"></ul>
            </div>

            <fieldset>
                <legend>GRADE</legend>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="grade" value="9" aria-label="Grade 9" disabled />
                        <span>09</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="grade" value="10" aria-label="Grade 10" disabled />
                        <span>10</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="grade" value="11" aria-label="Grade 11" disabled />
                        <span>11</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="grade" value="12" aria-label="Grade 12" disabled />
                        <span>12</span>
                    </label>
                </div>

                <div class="grade-help-link-container">
                    <span class="grade-help-link" onclick="showGradeHelpPopup()">Not the correct grade?</span>
                </div>
                <div id="gradeHelpPopup" class="grade-help-popup">
                    <div class="grade-help-popup-content">
                        <strong>Not the correct grade?</strong>
                        <p>Speak to Mr. Spencer about changing your grade in the Google Sheets Database.</p>
                        <button class="close-grade-help" onclick="closeGradeHelpPopup()">Close</button>
                    </div>
                </div>
            </fieldset>

            <label for="timeHour">TIME</label>
            <div class="time-container">
                <input type="number" id="timeHour" class="time-box" min="1" max="12" placeholder="HH" aria-label="Hour"
                    onfocus="stopClock()" />
                <input type="number" id="timeMin" class="time-box" min="0" max="59" placeholder="MM" aria-label="Minute"
                    onfocus="stopClock()" />
                <select id="timeAmPm" class="time-box" aria-label="AM/PM" onfocus="stopClock()" style="cursor: pointer">
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                </select>
            </div>

            <label for="notesInput">NOTES</label>
            <input type="text" name="notes" id="notesInput" placeholder="Notes (Optional)" aria-label="Notes" />

            <div class="button-group">
                <button type="button" class="action-btn btn-in" onclick="triggerSubmit('Check In')"
                    aria-label="Check In">
                    CHECK IN
                </button>
                <button type="button" class="action-btn btn-out" onclick="triggerSubmit('Check Out')"
                    aria-label="Check Out">
                    CHECK OUT
                </button>
            </div>
        </form>

        <div id="loading">
            <div class="spinner"></div>
            <p id="statusMsg" style="color: white; margin-top: 10px">
                PROCESSING...
            </p>
        </div>
    </div>

    <!-- Inject JavaScript -->
    <?!= include('JavaScript'); ?>

    <!-- Custom Popup Modal for all alerts/confirms -->
    <div id="customPopup" class="grade-help-popup" style="display:none;">
        <div class="grade-help-popup-content" id="customPopupContent">
            <strong id="customPopupTitle"></strong>
            <p id="customPopupMsg"></p>
            <div id="customPopupButtons"></div>
        </div>
    </div>
</body>

</html>
